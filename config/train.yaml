defaults:
  - dataset: default
  - dataset/split: rwrf_2022
  - dataset/var : cm
  - dataset/res: 4km
  - model/layer: resnet
  - model/module: default
  - model/system: standard 
  - callbacks: default
  - logger: default
  - _self_

experiment:
  name: test

dtype: float32

hydra:
  job:
    config:
      override_dirname:
        kv_sep: '_'
        item_sep: '-'
        exclude_keys:
          - experiment.name
          - trainer
  run:
    dir: ./experiments/${experiment.name}/
  sweep:
    dir: ./experiments/${experiment.name}/
    subdir: ${hydra.job.override_dirname}